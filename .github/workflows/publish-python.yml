name: Publish Python to PyPI

on:
  workflow_call:
  workflow_dispatch:

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    # NOTE: PyPI trusted publishing requires `environment: release` configured
    # in the repo. The fork (kevinypfan) doesn't have that environment, and
    # GitHub validates environment references at workflow startup even when
    # the job is skipped via `if:` — causing `startup_failure` for any release
    # triggered from the fork. Re-add this line before merging upstream:
    #   environment: release
    permissions:
      id-token: write  # CRITICAL: Required for OIDC token generation
      contents: read

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: List wheels to publish
        run: |
          echo "## Wheels to Publish" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Wheel | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|" >> $GITHUB_STEP_SUMMARY
          for wheel in dist/*.whl; do
            size=$(ls -lh "$wheel" | awk '{print $5}')
            name=$(basename "$wheel")
            echo "| $name | $size |" >> $GITHUB_STEP_SUMMARY
          done
          echo ""
          ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.2
        with:
          packages-dir: dist/
          skip-existing: true  # Allow re-runs without failure
          # No password/token needed - OIDC trusted publishing handles auth
