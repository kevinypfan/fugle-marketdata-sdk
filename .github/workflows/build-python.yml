name: Build Python Wheels

on:
  workflow_call:
    inputs:
      version:
        required: false
        type: string
        default: 'dev'
    outputs:
      version:
        description: "Package version from Cargo.toml"
        value: ${{ jobs.build.outputs.version }}
  workflow_dispatch:
    inputs:
      version:
        required: false
        type: string
        default: 'dev'
        description: "Version to build (for artifact naming)"

jobs:
  build:
    name: Build wheel (${{ matrix.os }}-${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — manylinux: off to skip docker. The pypa
          # manylinux container currently fails with `docker exit 1` on
          # GitHub-hosted runners; native-glibc wheels are acceptable for
          # internal distribution (users have compatible libc on modern
          # Linux). For public PyPI, re-enable manylinux before merge.
          - os: ubuntu-latest
            target: x86_64
            manylinux: 'off'
          # Linux aarch64 — native arm64 runner (ubuntu-24.04-arm, free for
          # public repos since 2025). Native compilation, no docker/QEMU.
          # Previously used x86_64 runner + QEMU cross-compile, which
          # triggered `docker exit 1` in maturin-action regardless of the
          # `manylinux: 'off'` setting.
          - os: ubuntu-24.04-arm
            target: aarch64
            manylinux: 'off'
          # macOS Intel — cross-compiled on Apple Silicon runner. The
          # dedicated `macos-13` Intel runner pool is scarce in GitHub's
          # hosted fleet and sporadically auto-cancels queued jobs before
          # they can allocate. Apple's clang toolchain on arm64 supports
          # targeting x86_64-apple-darwin natively (no emulation, just
          # linker flags), so we run both mac builds on a single
          # macos-14 runner with explicit target triples. Same strategy
          # build-nodejs.yml uses.
          - os: macos-14
            target: x86_64-apple-darwin
          # macOS Apple Silicon — native arm64 on the same runner pool
          - os: macos-14
            target: aarch64-apple-darwin
          # Windows x64
          - os: windows-latest
            target: x64

    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: py -> target
          shared-key: python-release

      - name: Extract version from Cargo.toml
        id: version
        shell: bash
        run: |
          VERSION=$(grep -A1 '\[workspace.package\]' Cargo.toml | grep 'version' | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Pinned to v1.51.0 — the floating `@v1` tag is stuck at the 2021
      # release and its docker-pull path is broken on current runners
      # (`/usr/bin/docker failed with exit code 1` at action step 585).
      - name: Build wheels
        uses: PyO3/maturin-action@v1.51.0
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release -m py/Cargo.toml --out dist

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl
          retention-days: 5
