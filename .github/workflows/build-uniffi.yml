name: Build UniFFI Native Libraries

on:
  workflow_call:
    outputs:
      version:
        description: "Package version from Cargo.toml"
        value: ${{ jobs.consolidate.outputs.version }}
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build UniFFI (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lib: libmarketdata_uniffi.so
            rid: linux-x64
          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            lib: libmarketdata_uniffi.dylib
            rid: osx-arm64
          # macOS x64 (Intel)
          - os: macos-latest
            target: x86_64-apple-darwin
            lib: libmarketdata_uniffi.dylib
            rid: osx-x64
          # Windows x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            lib: marketdata_uniffi.dll
            rid: win-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          shared-key: uniffi-release

      - name: Build UniFFI cdylib
        run: cargo build --release -p marketdata-uniffi --target ${{ matrix.target }}

      - name: Upload native library artifact
        uses: actions/upload-artifact@v4
        with:
          name: uniffi-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.lib }}
          retention-days: 5

  consolidate:
    name: Consolidate Native Libraries
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep -A1 '\[workspace.package\]' Cargo.toml | grep 'version' | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"

      - name: Download Linux x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: uniffi-x86_64-unknown-linux-gnu
          path: uniffi-all/linux-x64/

      - name: Download macOS ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: uniffi-aarch64-apple-darwin
          path: uniffi-all/osx-arm64/

      - name: Download macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: uniffi-x86_64-apple-darwin
          path: uniffi-all/osx-x64/

      - name: Download Windows x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: uniffi-x86_64-pc-windows-msvc
          path: uniffi-all/win-x64/

      - name: Verify consolidated structure
        run: |
          echo "Consolidated native libraries:"
          find uniffi-all -type f -exec ls -lh {} \;

          echo ""
          echo "Verifying required libraries exist..."
          test -f uniffi-all/linux-x64/libmarketdata_uniffi.so || exit 1
          test -f uniffi-all/osx-arm64/libmarketdata_uniffi.dylib || exit 1
          test -f uniffi-all/osx-x64/libmarketdata_uniffi.dylib || exit 1
          test -f uniffi-all/win-x64/marketdata_uniffi.dll || exit 1
          echo "All required libraries present."

      - name: Upload consolidated artifact
        uses: actions/upload-artifact@v4
        with:
          name: uniffi-all
          path: uniffi-all/
          retention-days: 5
