name: Java Bindings

on:
  push:
    paths:
      - 'uniffi/**'
      - 'core/**'
      - 'bindings/java/**'
      - '.github/workflows/java.yml'
  pull_request:
    paths:
      - 'uniffi/**'
      - 'core/**'
      - 'bindings/java/**'
      - '.github/workflows/java.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build and Test Java (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            lib-name: libmarketdata_uniffi.so
          - os: macos-latest
            lib-name: libmarketdata_uniffi.dylib
          - os: windows-latest
            lib-name: marketdata_uniffi.dll
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          shared-key: java-${{ matrix.os }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install uniffi-bindgen-java
        run: cargo install uniffi-bindgen-java --git https://github.com/NordSecurity/uniffi-bindgen-java --tag v0.1.0+v0.29.4

      - name: Build UniFFI library
        run: cargo build -p marketdata-uniffi --release

      - name: Generate Java bindings
        run: |
          uniffi-bindgen-java --library target/release/${{ matrix.lib-name }} \
            --out-dir bindings/java/src/main/java

      - name: Build Java bindings
        run: |
          cd bindings/java
          ./gradlew build --no-daemon

      - name: Run structural tests (no native library required)
        run: |
          cd bindings/java
          ./gradlew test --no-daemon --tests '*Test' --exclude-tag integration

      - name: Run integration tests (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
        run: |
          cd bindings/java
          ./gradlew test --no-daemon --tests '*Test' --tag integration
        continue-on-error: true

  verify-generation:
    name: Verify Java Binding Generation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build UniFFI library
        run: cargo build -p marketdata-uniffi --release

      - name: Install uniffi-bindgen-java
        run: cargo install uniffi-bindgen-java --git https://github.com/NordSecurity/uniffi-bindgen-java --tag v0.1.0+v0.29.4

      - name: Generate Java bindings
        run: |
          uniffi-bindgen-java --library target/release/libmarketdata_uniffi.so \
            --out-dir generated/java/

      - name: Verify generated files exist
        run: |
          test -d generated/java/tw/com/fugle/marketdata/generated || exit 1
          test -f generated/java/tw/com/fugle/marketdata/generated/RestClient.java || exit 1
          test -f generated/java/tw/com/fugle/marketdata/generated/WebSocketClient.java || exit 1
          echo "Java binding generation verified successfully"
