name: Verify Internal Smoke

# Runs automatically after an internal pre-release completes. Downloads the
# freshly-published artifacts from the GitHub Release page and sanity-checks
# that each language binding installs + imports + constructs a client with a
# fake token. No real API calls, no credentials needed.
#
# The job is expected to catch *packaging* bugs (missing native libraries,
# wrong runtime paths, ABI mismatches, missing transitive deps) — not SDK
# correctness bugs, which unit/integration tests cover.

on:
  workflow_run:
    workflows: ['Release']
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to smoke test (e.g. 0.2.0-rc.1)'
        required: true
        type: string

jobs:
  resolve-version:
    name: Resolve Version
    # Fire after any non-cancelled prerelease run (tag contains '-').
    # The upstream release.yml may report `failure` even when a partial
    # Release was successfully published — e.g. a single non-critical
    # wheel build failing but the other 5 languages all green. We still
    # want to smoke-test whatever assets actually made it to the Release
    # page, so we accept both `success` and `failure` conclusions. If
    # no Release was created at all, the `gh release download` in each
    # smoke job will fail fast with a clear error.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion != 'cancelled' &&
       startsWith(github.event.workflow_run.head_branch, 'v') &&
       contains(github.event.workflow_run.head_branch, '-'))
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - id: v
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            # When triggered by workflow_run, the ref is the branch/tag that
            # triggered the upstream workflow. head_branch is the tag name.
            VERSION="${{ github.event.workflow_run.head_branch }}"
            VERSION="${VERSION#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Smoke testing v$VERSION"

  # ==============================================================
  # Python
  # ==============================================================
  smoke-python:
    name: Smoke — Python
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download wheel from Release
        env:
          TAG: ${{ needs.resolve-version.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern 'fugle_marketdata-*linux*x86_64.whl' \
            --dir ./wheels

      - name: Install wheel
        run: |
          pip install ./wheels/*.whl

      - name: Import + construct client
        run: |
          python -c "
          from fugle_marketdata import RestClient, MarketDataError
          client = RestClient(api_key='smoke-test-token')
          assert hasattr(client, 'stock'), 'missing stock accessor'
          assert hasattr(client, 'futopt'), 'missing futopt accessor'
          assert MarketDataError is not None
          print('OK: Python binding packaging verified')
          "

  # ==============================================================
  # Node.js
  # ==============================================================
  smoke-nodejs:
    name: Smoke — Node.js
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download tarball from Release
        env:
          TAG: ${{ needs.resolve-version.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern 'fugle-marketdata-*.tgz' \
            --dir ./nodejs

      - name: Install into temp project
        run: |
          mkdir smoke && cd smoke
          npm init -y
          npm install "../nodejs/$(ls ../nodejs)"

      - name: Require + construct client
        working-directory: smoke
        run: |
          node -e "
          const { RestClient } = require('@fugle/marketdata');
          const client = new RestClient({ apiKey: 'smoke-test-token' });
          if (!client.stock) throw new Error('missing stock accessor');
          if (!client.futopt) throw new Error('missing futopt accessor');
          console.log('OK: Node.js binding packaging verified');
          "

  # ==============================================================
  # C#
  # ==============================================================
  smoke-csharp:
    name: Smoke — C#
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Download .nupkg from Release
        env:
          TAG: ${{ needs.resolve-version.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern 'MarketdataUniffi.*.nupkg' \
            --dir ./nupkg

      - name: Create smoke project
        run: |
          mkdir smoke && cd smoke
          dotnet new console
          dotnet nuget add source "$(pwd)/../nupkg" -n local-internal
          dotnet add package MarketdataUniffi --version "${{ needs.resolve-version.outputs.version }}"

      - name: Write smoke program
        run: |
          cat > smoke/Program.cs <<'EOF'
          using FugleMarketData;
          var config = new RestClientConfig { ApiKey = "smoke-test-token" };
          var client = new RestClient(config);
          if (client.Stock == null) throw new System.Exception("missing Stock accessor");
          if (client.FutOpt == null) throw new System.Exception("missing FutOpt accessor");
          System.Console.WriteLine("OK: C# binding packaging verified");
          EOF

      - name: Build + run
        working-directory: smoke
        run: dotnet run --configuration Release

  # ==============================================================
  # Java
  # ==============================================================
  # Java artifact lives on GitHub Packages rather than the Release page.
  # Uses GITHUB_TOKEN for the same org — no extra PAT needed for smoke.
  smoke-java:
    name: Smoke — Java
    needs: resolve-version
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Create Gradle smoke project
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          mkdir -p smoke/src/main/java/smoke
          cat > smoke/build.gradle.kts <<EOF
          plugins { application }
          repositories {
              maven {
                  url = uri("https://maven.pkg.github.com/${{ github.repository }}")
                  credentials {
                      username = System.getenv("GITHUB_ACTOR")
                      password = System.getenv("GITHUB_TOKEN")
                  }
              }
              mavenCentral()
          }
          dependencies { implementation("tw.com.fugle:marketdata-java:$VERSION") }
          application { mainClass.set("smoke.Smoke") }
          EOF
          cat > smoke/settings.gradle.kts <<EOF
          rootProject.name = "smoke"
          EOF
          cat > smoke/src/main/java/smoke/Smoke.java <<'EOF'
          package smoke;
          import tw.com.fugle.marketdata.FugleRestClient;
          public class Smoke {
              public static void main(String[] args) {
                  var client = FugleRestClient.builder().apiKey("smoke-test-token").build();
                  if (client.stock() == null) throw new RuntimeException("missing stock accessor");
                  if (client.futopt() == null) throw new RuntimeException("missing futopt accessor");
                  System.out.println("OK: Java binding packaging verified");
              }
          }
          EOF

      - name: Run smoke
        working-directory: smoke
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gradle run

  # ==============================================================
  # Go
  # ==============================================================
  smoke-go:
    name: Smoke — Go
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download Go tarball from Release
        env:
          TAG: ${{ needs.resolve-version.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern 'fugle-marketdata-go-linux-x64-*.tar.gz' \
            --dir ./go-dl

      - name: Extract
        run: |
          mkdir -p vendor
          tar -xzf go-dl/fugle-marketdata-go-linux-x64-*.tar.gz -C vendor/
          mv vendor/fugle-marketdata-go-linux-x64-* vendor/fugle-marketdata-go
          ls -la vendor/fugle-marketdata-go/

      - name: Create smoke project
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          mkdir smoke && cd smoke
          go mod init smoke
          cat >> go.mod <<EOF
          require github.com/fugle-dev/fugle-marketdata-go v0.0.0-internal
          replace github.com/fugle-dev/fugle-marketdata-go => ../vendor/fugle-marketdata-go/src
          EOF
          cat > main.go <<'EOF'
          package main
          import (
              "fmt"
              marketdata "github.com/fugle-dev/fugle-marketdata-go"
          )
          func main() {
              client, err := marketdata.NewRestClient(marketdata.RestClientConfig{ApiKey: "smoke-test-token"})
              if err != nil { panic(err) }
              if client == nil { panic("nil client") }
              fmt.Println("OK: Go binding packaging verified")
          }
          EOF

      - name: Build + run
        working-directory: smoke
        env:
          CGO_ENABLED: '1'
          CGO_LDFLAGS: -L${{ github.workspace }}/vendor/fugle-marketdata-go/lib -lmarketdata_uniffi
          LD_LIBRARY_PATH: ${{ github.workspace }}/vendor/fugle-marketdata-go/lib
        run: go run .

  # ==============================================================
  # C++
  # ==============================================================
  smoke-cpp:
    name: Smoke — C++
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - name: Download C++ tarball from Release
        env:
          TAG: ${{ needs.resolve-version.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern 'fugle-marketdata-cpp-linux-x64-*.tar.gz' \
            --dir ./cpp-dl

      - name: Extract
        run: |
          tar -xzf cpp-dl/fugle-marketdata-cpp-linux-x64-*.tar.gz
          SDK_DIR=$(ls -d fugle-marketdata-cpp-linux-x64-*)
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV
          ls -la "$SDK_DIR/"

      - name: Write smoke program
        run: |
          cat > smoke.cpp <<'EOF'
          #include <cstdio>
          #include "marketdata_uniffi.hpp"
          int main() {
              // Packaging smoke test: we only need the header to compile and
              // the dylib to load. No actual API call.
              printf("OK: C++ binding packaging verified (headers + dylib link)\n");
              return 0;
          }
          EOF

      - name: Compile + link
        run: |
          c++ -std=c++20 -O2 \
              -I"${SDK_DIR}/include" \
              smoke.cpp "${SDK_DIR}/include/marketdata_uniffi.cpp" \
              -L"${SDK_DIR}/lib" -lmarketdata_uniffi \
              -o smoke

      - name: Run
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/${{ env.SDK_DIR }}/lib
        run: ./smoke

  # ==============================================================
  # Summary
  # ==============================================================
  summary:
    name: Summary
    needs: [resolve-version, smoke-python, smoke-nodejs, smoke-csharp, smoke-java, smoke-go, smoke-cpp]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          VERSION=${{ needs.resolve-version.outputs.version }}
          echo "## Internal Smoke Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Language | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python | ${{ needs.smoke-python.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js | ${{ needs.smoke-nodejs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| C# | ${{ needs.smoke-csharp.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Java | ${{ needs.smoke-java.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Go | ${{ needs.smoke-go.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| C++ | ${{ needs.smoke-cpp.result }} |" >> $GITHUB_STEP_SUMMARY
