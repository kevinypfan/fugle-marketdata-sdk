name: C# Bindings

on:
  workflow_call:
  workflow_dispatch:

jobs:
  test:
    name: Test C# (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: uniffi -> target
          shared-key: csharp-${{ matrix.os }}

      - name: Build C# binding
        run: cargo build -p marketdata-uniffi

      - name: Run Rust tests
        run: cargo test -p marketdata-uniffi

      # .NET integration tests will be added in Phase 4
