name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Prevent two near-simultaneous tag pushes from racing on the shared rust-cache
# keys used by build-uniffi. Per-tag grouping lets rc.1 and rc.2 both run, but
# never concurrently (`cancel-in-progress: false` keeps the in-flight one alive).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

# Workflow-level permissions. Reusable workflows (publish-java, publish-nodejs,
# create-release) need these to push to GitHub Packages, attest provenance,
# and publish releases. Caller must grant at least as much as any callee asks.
permissions:
  contents: write   # create releases, upload assets
  packages: write   # publish Java to GitHub Packages
  id-token: write   # PyPI trusted publishing / npm provenance (stable path)

jobs:
  # ==============================================================
  # Extract version + channel (stable / prerelease) from tag
  # ==============================================================
  # A tag like `v0.2.0`        → channel=stable    (push to public registries)
  # A tag like `v0.2.0-rc.1`   → channel=prerelease (only internal channels)
  # The channel flag drives both publish-job gating and include_cpp build.
  extract-version:
    name: Extract Version from Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      channel: ${{ steps.version.outputs.channel }}
    steps:
      - id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *-* ]]; then
            echo "channel=prerelease" >> $GITHUB_OUTPUT
          else
            echo "channel=stable" >> $GITHUB_OUTPUT
          fi

      - name: Summary
        run: |
          VERSION=${{ steps.version.outputs.version }}
          CHANNEL=${{ steps.version.outputs.channel }}
          echo "## Release v$VERSION ($CHANNEL)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "$CHANNEL" == "stable" ]]; then
            echo "Starting **stable** release — will publish to PyPI, npm, NuGet, GitHub Packages (Java)." >> $GITHUB_STEP_SUMMARY
          else
            echo "Starting **prerelease** release — will attach artifacts to GitHub Release (Java also goes to GitHub Packages)." >> $GITHUB_STEP_SUMMARY
          fi

  # ==============================================================
  # Wave 1: Build all platforms in parallel
  # ==============================================================
  build-python:
    name: Build Python Wheels
    needs: extract-version
    uses: ./.github/workflows/build-python.yml
    with:
      version: ${{ needs.extract-version.outputs.version }}

  build-nodejs:
    name: Build Node.js Native Addon
    needs: extract-version
    uses: ./.github/workflows/build-nodejs.yml
    with:
      version: ${{ needs.extract-version.outputs.version }}

  build-uniffi:
    name: Build UniFFI Native Libraries
    needs: extract-version
    uses: ./.github/workflows/build-uniffi.yml
    with:
      # Only build cpp feature variant on prerelease channel (internal use).
      # Public stable releases never built cpp, and we keep it that way to
      # avoid ~18 min of extra matrix time on every stable release.
      include_cpp: ${{ needs.extract-version.outputs.channel == 'prerelease' }}

  # ==============================================================
  # Wave 2a: Publish to public registries (stable channel only)
  # ==============================================================
  publish-python:
    name: Publish to PyPI
    needs: [extract-version, build-python]
    if: needs.extract-version.outputs.channel == 'stable'
    uses: ./.github/workflows/publish-python.yml

  publish-nodejs:
    name: Publish to npm
    needs: [extract-version, build-nodejs]
    if: needs.extract-version.outputs.channel == 'stable'
    uses: ./.github/workflows/publish-nodejs.yml
    # `secrets: inherit` bypasses compile-time validation of required secrets
    # on forks that don't have NPM_TOKEN configured. The `if:` gate keeps this
    # job from actually running on prerelease channel, so the missing secret
    # never matters at runtime.
    secrets: inherit

  publish-nuget:
    name: Publish to NuGet
    needs: [extract-version, build-uniffi]
    if: needs.extract-version.outputs.channel == 'stable'
    uses: ./.github/workflows/publish-nuget.yml
    with:
      version: ${{ needs.extract-version.outputs.version }}
    secrets: inherit

  # Java runs on both channels — it's already on GitHub Packages with
  # GITHUB_TOKEN auth, no public registry involved even for stable releases.
  publish-java:
    name: Publish to GitHub Packages (Java)
    needs: [extract-version, build-uniffi]
    uses: ./.github/workflows/publish-java.yml
    with:
      version: ${{ needs.extract-version.outputs.version }}

  # ==============================================================
  # Wave 2b: Package internal artifacts (prerelease channel only)
  # ==============================================================
  # Each job downloads what Wave 1 produced, repackages it into a form
  # suitable for direct download from the GitHub Release page, and uploads
  # a uniquely-named artifact that Wave 3 attaches to the release.

  pack-internal-python:
    name: Package internal Python wheels
    needs: [extract-version, build-python]
    # Lenient gate — runs whenever build-python attempted to run (even with
    # partial matrix failures). Downloads whatever wheel-* artifacts exist,
    # so internal users still get wheels for the platforms that did build.
    if: |
      !cancelled() &&
      needs.extract-version.outputs.channel == 'prerelease' &&
      needs.build-python.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Download wheels from build-python
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: ./dist
        # Continue even if some matrix entries failed to produce wheels —
        # `download-artifact` returns success when pattern matches zero
        # artifacts (it just downloads nothing).

      - name: List wheels
        run: ls -la dist/ || echo "(no wheels available)"

      - name: Upload as internal artifact
        uses: actions/upload-artifact@v4
        with:
          name: internal-python
          path: dist/*.whl
          retention-days: 5
          if-no-files-found: warn

  pack-internal-nodejs:
    name: Package internal Node.js tarball (fat, all platforms)
    needs: [extract-version, build-nodejs]
    # Lenient gate — same rationale as pack-internal-python above.
    if: |
      !cancelled() &&
      needs.extract-version.outputs.channel == 'prerelease' &&
      needs.build-nodejs.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust (warm from build-nodejs)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: js -> target
          shared-key: nodejs-release-x86_64-unknown-linux-gnu

      - name: Install deps
        working-directory: js
        run: npm ci

      # Inject the tag-derived version into package.json before the local
      # build below bakes it into js/index.js version-check literals. Must
      # run after `npm ci` (which reads from package.json) and before
      # `npm run build` (which regenerates index.js). --allow-same-version
      # avoids error on stable builds where injected == current.
      - name: Inject version into package.json
        working-directory: js
        run: npm version --no-git-tag-version --allow-same-version "${{ needs.extract-version.outputs.version }}"

      # Run a local build to generate js/index.js + js/index.d.ts + the loader.
      # We keep the default (pre-prepublish) loader so the resulting tarball
      # resolves .node files by process.platform rather than via
      # optionalDependencies (which wouldn't be installable offline).
      # package.json is the one artifact we DO want modified (via the inject
      # step above) — its `files` array already includes `*.node`.
      - name: Local build (generates index.js + loader)
        working-directory: js
        run: npm run build

      # Overwrite the just-built .node file with the full set from all
      # platforms, so the resulting tarball contains every platform's binary.
      - name: Download all platform binaries
        uses: actions/download-artifact@v4
        with:
          pattern: bindings-*
          path: js/artifacts/

      - name: Install all platform .node files into js/ root
        working-directory: js
        run: |
          rm -f *.node
          for dir in artifacts/bindings-*; do
            cp "$dir"/*.node .
          done
          ls -la *.node

      - name: Pack fat main tarball
        working-directory: js
        run: |
          mkdir -p ../nodejs-dist
          npm pack --pack-destination ../nodejs-dist
          ls -la ../nodejs-dist/

      - name: Upload as internal artifact
        uses: actions/upload-artifact@v4
        with:
          name: internal-nodejs
          path: nodejs-dist/*.tgz
          retention-days: 5

  pack-internal-nuget:
    name: Package internal C# .nupkg
    needs: [extract-version, build-uniffi]
    if: needs.extract-version.outputs.channel == 'prerelease'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Download unified native library artifact
        uses: actions/download-artifact@v4
        with:
          name: uniffi-all
          path: native-libs/

      # Same layout as publish-nuget.yml so dotnet pack picks up natives.
      - name: Copy native libraries to runtimes
        run: |
          mkdir -p bindings/csharp/MarketdataUniffi/runtimes/linux-x64/native
          mkdir -p bindings/csharp/MarketdataUniffi/runtimes/osx-arm64/native
          mkdir -p bindings/csharp/MarketdataUniffi/runtimes/osx-x64/native
          mkdir -p bindings/csharp/MarketdataUniffi/runtimes/win-x64/native
          cp native-libs/linux-x64/*.so bindings/csharp/MarketdataUniffi/runtimes/linux-x64/native/
          cp native-libs/osx-arm64/*.dylib bindings/csharp/MarketdataUniffi/runtimes/osx-arm64/native/
          cp native-libs/osx-x64/*.dylib bindings/csharp/MarketdataUniffi/runtimes/osx-x64/native/
          cp native-libs/win-x64/*.dll bindings/csharp/MarketdataUniffi/runtimes/win-x64/native/

      - name: Pack .nupkg
        working-directory: bindings/csharp/MarketdataUniffi
        run: dotnet pack -c Release -p:Version=${{ needs.extract-version.outputs.version }} -o nupkg

      - name: Upload as internal artifact
        uses: actions/upload-artifact@v4
        with:
          name: internal-nuget
          path: bindings/csharp/MarketdataUniffi/nupkg/*.nupkg
          retention-days: 5

  pack-internal-go:
    name: Package internal Go tarballs
    needs: [extract-version, build-uniffi]
    if: needs.extract-version.outputs.channel == 'prerelease'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download unified native library artifact
        uses: actions/download-artifact@v4
        with:
          name: uniffi-all
          path: native-libs/

      # Build one tar.gz per platform. Each archive contains:
      #   src/                — bindings/go/marketdata source (same for all)
      #   lib/libmarketdata_uniffi.{so,dylib,dll}  — platform-specific
      #   README.md           — CGO_LDFLAGS setup instructions
      # Internal users download the tar.gz matching their platform, extract
      # into ./vendor/, then use a `replace` directive in their go.mod.
      - name: Assemble tarballs
        env:
          VERSION: ${{ needs.extract-version.outputs.version }}
        run: |
          mkdir -p go-dist
          for entry in "linux-x64:so" "osx-arm64:dylib" "osx-x64:dylib" "win-x64:dll"; do
            rid="${entry%:*}"
            ext="${entry#*:}"
            stage="fugle-marketdata-go-${rid}-${VERSION}"
            mkdir -p "$stage/src" "$stage/lib"
            cp -r bindings/go/marketdata/. "$stage/src/"
            # Windows lib has no "lib" prefix, handle both cases.
            cp native-libs/${rid}/*.${ext} "$stage/lib/"
            cat > "$stage/README.md" <<EOF
          # fugle-marketdata-go (internal ${VERSION} / ${rid})

          See docs/INTERNAL_INSTALL.md#go for full setup. TL;DR:

          1. Extract this archive somewhere like ./vendor/fugle-marketdata-go/
          2. In your go.mod, add:

             replace github.com/fugle-dev/fugle-marketdata-go => ./vendor/fugle-marketdata-go/src

          3. Set CGO flags before \`go build\`:

             export CGO_LDFLAGS="-L\$(pwd)/vendor/fugle-marketdata-go/lib -lmarketdata_uniffi"

          On macOS: export DYLD_LIBRARY_PATH=\$(pwd)/vendor/fugle-marketdata-go/lib:\$DYLD_LIBRARY_PATH
          On Linux: export LD_LIBRARY_PATH=\$(pwd)/vendor/fugle-marketdata-go/lib:\$LD_LIBRARY_PATH
          On Windows: add vendor\\fugle-marketdata-go\\lib to PATH
          EOF
            tar -czf "go-dist/${stage}.tar.gz" -C "$(dirname "$stage")" "$(basename "$stage")"
            rm -rf "$stage"
          done
          ls -la go-dist/

      - name: Upload as internal artifact
        uses: actions/upload-artifact@v4
        with:
          name: internal-go
          path: go-dist/*.tar.gz
          retention-days: 5

  pack-internal-cpp:
    name: Package internal C++ tarballs
    needs: [extract-version, build-uniffi]
    if: needs.extract-version.outputs.channel == 'prerelease'
    runs-on: ubuntu-latest
    steps:
      # Single download covers both the per-platform dylibs (uniffi-cpp-<target>)
      # and the shared headers artifact (uniffi-cpp-headers). Each lands in its
      # own subdirectory under cpp-libs/ keyed by artifact name.
      - name: Download all cpp-feature artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: uniffi-cpp-*
          path: cpp-libs/

      - name: List downloads
        run: find cpp-libs -type f

      - name: Assemble tarballs
        env:
          VERSION: ${{ needs.extract-version.outputs.version }}
        run: |
          mkdir -p cpp-dist
          # Map rid → source artifact dir + lib filename pattern
          for entry in \
              "linux-x64:uniffi-cpp-x86_64-unknown-linux-gnu:libmarketdata_uniffi.so" \
              "osx-arm64:uniffi-cpp-aarch64-apple-darwin:libmarketdata_uniffi.dylib" \
              "osx-x64:uniffi-cpp-x86_64-apple-darwin:libmarketdata_uniffi.dylib" \
              "win-x64:uniffi-cpp-x86_64-pc-windows-msvc:marketdata_uniffi.dll"; do
            rid="${entry%%:*}"
            rest="${entry#*:}"
            artifact="${rest%%:*}"
            libfile="${rest#*:}"
            stage="fugle-marketdata-cpp-${rid}-${VERSION}"
            mkdir -p "$stage/include" "$stage/lib"
            cp cpp-libs/uniffi-cpp-headers/marketdata_uniffi.hpp "$stage/include/"
            cp cpp-libs/uniffi-cpp-headers/marketdata_uniffi.cpp "$stage/include/"
            cp "cpp-libs/${artifact}/${libfile}" "$stage/lib/"
            cat > "$stage/README.md" <<EOF
          # fugle-marketdata-cpp (internal ${VERSION} / ${rid})

          See docs/INTERNAL_INSTALL.md#c for full setup. TL;DR:

              c++ -std=c++20 -Iinclude \\
                  include/marketdata_uniffi.cpp my_app.cpp \\
                  -Llib -lmarketdata_uniffi \\
                  -o my_app

          On macOS: export DYLD_LIBRARY_PATH=\$(pwd)/lib:\$DYLD_LIBRARY_PATH
          On Linux: export LD_LIBRARY_PATH=\$(pwd)/lib:\$LD_LIBRARY_PATH
          On Windows: add lib to PATH and use \`marketdata_uniffi.dll\`
          EOF
            tar -czf "cpp-dist/${stage}.tar.gz" -C "$(dirname "$stage")" "$(basename "$stage")"
            rm -rf "$stage"
          done
          ls -la cpp-dist/

      - name: Upload as internal artifact
        uses: actions/upload-artifact@v4
        with:
          name: internal-cpp
          path: cpp-dist/*.tar.gz
          retention-days: 5

  # ==============================================================
  # Wave 3: Create GitHub Release after all publishes & packaging
  # ==============================================================
  create-release:
    name: Create GitHub Release
    needs:
      - extract-version
      - publish-python
      - publish-nodejs
      - publish-nuget
      - publish-java
      - pack-internal-python
      - pack-internal-nodejs
      - pack-internal-nuget
      - pack-internal-go
      - pack-internal-cpp
    # Gating policy differs per channel:
    #   • Stable: all needed jobs must succeed (or be skipped) — one publish
    #     failure is a hard stop, matching the "atomic public release" contract.
    #   • Prerelease: ship whatever packaging jobs produced. An isolated build
    #     failure (e.g. Python Linux wheels) shouldn't block the GitHub Release
    #     from being created with the 5/6 languages' assets that did succeed.
    #     The release notes will reflect partial availability.
    if: |
      !cancelled() && (
        (needs.extract-version.outputs.channel == 'stable' && !contains(needs.*.result, 'failure')) ||
        needs.extract-version.outputs.channel == 'prerelease'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Create the directory unconditionally so the `files:` glob in the
      # create-release step always has a valid path (stable channel just
      # gets an empty dir, which softprops/action-gh-release handles fine).
      - name: Ensure release-assets directory exists
        run: mkdir -p release-assets

      # Pull every internal-* artifact into a single flat directory so
      # softprops/action-gh-release can attach them to the Release page.
      # Only runs on prerelease channel (where pack-internal-* jobs actually
      # produced artifacts).
      - name: Download internal artifacts
        if: needs.extract-version.outputs.channel == 'prerelease'
        uses: actions/download-artifact@v4
        with:
          pattern: internal-*
          merge-multiple: true
          path: ./release-assets

      - name: List release assets
        if: needs.extract-version.outputs.channel == 'prerelease'
        run: ls -la release-assets/ || echo "(no assets — stable channel)"

      - name: Generate release notes
        run: |
          VERSION=${{ needs.extract-version.outputs.version }}
          CHANNEL=${{ needs.extract-version.outputs.channel }}
          SHA=${{ github.sha }}

          if [[ "$CHANNEL" == "stable" ]]; then
            cat > release_notes.md <<'STABLE_NOTES'
          ## What's Changed

          This release publishes version ${VERSION} across all supported platforms.

          ### Installation

          **Python** (via pip):
          ```bash
          pip install fugle-marketdata==${VERSION}
          ```

          **Node.js** (via npm):
          ```bash
          npm install @fugle/marketdata@${VERSION}
          ```

          **C#** (via NuGet):
          ```bash
          dotnet add package MarketdataUniffi --version ${VERSION}
          ```

          **Java** (via GitHub Packages):
          Add to your `build.gradle.kts`:
          ```kotlin
          repositories {
              maven {
                  url = uri("https://maven.pkg.github.com/kevinypfan/fugle-marketdata-sdk")
                  credentials {
                      username = System.getenv("GITHUB_ACTOR")
                      password = System.getenv("GITHUB_TOKEN")
                  }
              }
          }

          dependencies {
              implementation("tw.com.fugle:marketdata-java:${VERSION}")
          }
          ```

          ### Packages Published

          | Platform | Package | Registry |
          |----------|---------|----------|
          | Python | `fugle-marketdata` | [PyPI](https://pypi.org/project/fugle-marketdata/) |
          | Node.js | `@fugle/marketdata` | [npm](https://www.npmjs.com/package/@fugle/marketdata) |
          | C# | `MarketdataUniffi` | [NuGet](https://www.nuget.org/packages/MarketdataUniffi/) |
          | Java | `tw.com.fugle:marketdata-java` | GitHub Packages |

          Built from commit `${SHA}`.
          STABLE_NOTES
          else
            cat > release_notes.md <<'PRERELEASE_NOTES'
          ## Internal Pre-release ${VERSION}

          > **⚠️ This is a pre-release for internal trial only.** It is not published to public package registries (PyPI / npm / NuGet / Maven Central). Not recommended for production use.

          See [`docs/INTERNAL_INSTALL.md`](https://github.com/${{ github.repository }}/blob/${SHA}/docs/INTERNAL_INSTALL.md) for full installation instructions.

          ### Quick install

          | Language | How |
          |----------|-----|
          | Python | Download `.whl` below, `pip install ./fugle_marketdata-*.whl` |
          | Node.js | Download matching platform `.tgz` + main `.tgz`, `npm install` both |
          | C# | Download `.nupkg` below, add as local nuget source |
          | Java | Fetch from GitHub Packages (`tw.com.fugle:marketdata-java:${VERSION}`) |
          | Go | Download matching platform `.tar.gz`, use `replace` directive |
          | C++ | Download matching platform `.tar.gz`, `-Iinclude -Llib -lmarketdata_uniffi` |

          Built from commit `${SHA}`.
          PRERELEASE_NOTES
          fi

          # Expand ${VERSION}, ${SHA}, and github expressions. Use sed rather
          # than envsubst because envsubst would eat ${GITHUB_TOKEN} /
          # ${GITHUB_ACTOR} literals in the Java install instructions.
          sed -i "s|\${VERSION}|$VERSION|g" release_notes.md
          sed -i "s|\${SHA}|$SHA|g" release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.extract-version.outputs.version, '-') }}
          files: |
            ./release-assets/*

      - name: Release Summary
        run: |
          VERSION=${{ needs.extract-version.outputs.version }}
          CHANNEL=${{ needs.extract-version.outputs.channel }}
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Release Complete :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $VERSION ($CHANNEL)" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "$CHANNEL" == "stable" ]]; then
            echo "### Published to Public Registries" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Platform | Package |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|---------|" >> $GITHUB_STEP_SUMMARY
            echo "| Python | fugle-marketdata |" >> $GITHUB_STEP_SUMMARY
            echo "| Node.js | @fugle/marketdata |" >> $GITHUB_STEP_SUMMARY
            echo "| C# | MarketdataUniffi |" >> $GITHUB_STEP_SUMMARY
            echo "| Java | marketdata-java (GitHub Packages) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Internal Pre-release Assets" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "See the Release page for downloadable artifacts." >> $GITHUB_STEP_SUMMARY
            echo "Java pushed to GitHub Packages with version \`$VERSION\`." >> $GITHUB_STEP_SUMMARY
          fi
